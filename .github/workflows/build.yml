# Dependencias: git, repo, python3, openjdk-11-jdk
# Version: 1
# Changelog:
# - v1: Creación del workflow automatizado para compilar crDroid 12.1 para j4primelte usando GitHub Actions.

name: Compilador Automatizado crDroid - J4+

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Maximizar Espacio en el Runner
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf /etc/apt/sources.list.d/*

    - name: Configurar Entorno de Compilación
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-11-jdk python3
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Configurar Git
      run: |
        git config --global user.name "Papi Mendez"
        git config --global user.email "papi.mendez@github.com"

    - name: Inicializar Repositorio crDroid
      run: |
        mkdir -p ~/crDroid
        cd ~/crDroid
        repo init -u https://github.com/crdroidandroid/android.git -b 12.1 --git-lfs --depth=1

    - name: Agregar Manifiesto Local para J4+
      run: |
        cd ~/crDroid
        mkdir -p .repo/local_manifests
        cat <<EOF > .repo/local_manifests/j4plus.xml
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <!-- Remotos -->
          <remote name="j4plus" fetch="https://github.com/Samsung-Galaxy-J4" revision="lineage-19.1" />

          <!-- Árboles de Dispositivo (Device Tree) -->
          <project path="device/samsung/j4primelte" name="android_device_samsung_j4primelte" remote="j4plus" />
          <project path="device/samsung/msm8917-common" name="android_device_samsung_msm8917-common" remote="j4plus" />

          <!-- Kernel Tree -->
          <project path="kernel/samsung/msm8917" name="android_kernel_samsung_msm8917" remote="j4plus" />

          <!-- Vendor Trees (Proveedores) -->
          <project path="vendor/samsung/j4primelte" name="android_vendor_samsung_j4primelte" remote="j4plus" />
          <project path="vendor/samsung/msm8917-common" name="android_vendor_samsung_msm8917-common" remote="j4plus" />
        </manifest>
        EOF

    - name: Sincronizar Fuentes
      run: |
        cd ~/crDroid
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Compilar ROM
      run: |
        cd ~/crDroid
        . build/envsetup.sh
        lunch crdroid_j4primelte-userdebug
        mka bacon

    - name: Subir Artefacto Compilado
      uses: actions/upload-artifact@v4
      with:
        name: crDroid-j4primelte
        path: ~/crDroid/out/target/product/j4primelte/*.zip
